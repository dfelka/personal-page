<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blueprint drawing of the Pulse Fitness watch and heart-rate trace">
  <defs>
    <pattern id="grid-s4" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <pattern id="grid-l4" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0f375a"/>
  <rect width="800" height="600" fill="url(#grid-s4)"/>
  <rect width="800" height="600" fill="url(#grid-l4)"/>
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#cfe4ff" stroke-opacity=".55" stroke-width="2"/>

  <g fill="none" stroke="#eaf3ff" stroke-opacity=".9" stroke-width="2">
    <!-- smartwatch -->
    <rect x="250" y="150" width="180" height="210" rx="40"/>
    <rect x="300" y="118" width="80" height="40" rx="10"/>
    <rect x="300" y="352" width="80" height="40" rx="10"/>
    <circle cx="340" cy="255" r="70"/>
    <!-- construction guides -->
    <g stroke-width="1" stroke-opacity=".45">
      <line x1="340" y1="150" x2="340" y2="360"/>
      <line x1="250" y1="255" x2="430" y2="255"/>
      <circle cx="340" cy="255" r="92"/>
    </g>
    <!-- heart-rate trace panel -->
    <rect x="470" y="200" width="250" height="120" rx="4"/>
  </g>

  <!-- accent ECG waveform -->
  <polyline points="480,260 520,260 535,260 545,230 560,300 575,200 590,290 605,260 640,260 655,260 665,235 680,270 710,260"
            fill="none" stroke="#ff6464" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="480" y="345" fill="#cfe4ff" font-family="monospace" font-size="14">BPM 072</text>

  <!-- diameter callout -->
  <g stroke="#cfe4ff" stroke-opacity=".7" stroke-width="1.2">
    <line x1="248" y1="255" x2="180" y2="255"/>
  </g>
  <text x="120" y="250" fill="#cfe4ff" font-family="monospace" font-size="14">R 92</text>

  <!-- title block -->
  <g stroke="#cfe4ff" stroke-opacity=".6" fill="none" stroke-width="1.4">
    <rect x="500" y="516" width="282" height="66"/>
    <line x1="500" y1="549" x2="782" y2="549"/>
    <line x1="640" y1="516" x2="640" y2="582"/>
  </g>
  <text x="512" y="538" fill="#eaf3ff" font-family="monospace" font-size="17" letter-spacing="1">PULSE FITNESS</text>
  <text x="512" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">MOBILE APP</text>
  <text x="652" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">REV · A</text>
</svg>
