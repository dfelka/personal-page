<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blueprint drawing of the Vertex Studio wireframe solid">
  <defs>
    <pattern id="grid-s6" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <pattern id="grid-l6" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="1"/>
    </pattern>
    <marker id="arw6" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9z" fill="#cfe4ff"/></marker>
  </defs>
  <rect width="800" height="600" fill="#0f375a"/>
  <rect width="800" height="600" fill="url(#grid-s6)"/>
  <rect width="800" height="600" fill="url(#grid-l6)"/>
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#cfe4ff" stroke-opacity=".55" stroke-width="2"/>

  <!-- isometric axes -->
  <g stroke="#cfe4ff" stroke-opacity=".55" stroke-width="1.3">
    <line x1="400" y1="290" x2="400" y2="150" marker-end="url(#arw6)"/>
    <line x1="400" y1="290" x2="270" y2="360" marker-end="url(#arw6)"/>
    <line x1="400" y1="290" x2="560" y2="360" marker-end="url(#arw6)"/>
  </g>
  <text x="410" y="150" fill="#cfe4ff" font-family="monospace" font-size="13">Z</text>
  <text x="250" y="378" fill="#cfe4ff" font-family="monospace" font-size="13">X</text>
  <text x="560" y="378" fill="#cfe4ff" font-family="monospace" font-size="13">Y</text>

  <!-- wireframe cube -->
  <g fill="none" stroke="#eaf3ff" stroke-opacity=".92" stroke-width="2">
    <polygon points="440,210 560,270 560,400 440,340"/>
    <polygon points="440,210 320,270 320,400 440,340"/>
    <polygon points="440,210 320,270 440,330 560,270"/>
    <!-- hidden edges -->
    <g stroke-opacity=".4" stroke-dasharray="6 5">
      <line x1="320" y1="400" x2="440" y2="460"/>
      <line x1="560" y1="400" x2="440" y2="460"/>
      <line x1="440" y1="330" x2="440" y2="460"/>
    </g>
  </g>

  <!-- accent vertex -->
  <circle cx="440" cy="210" r="7" fill="#ff6464"/>

  <!-- dimension -->
  <g stroke="#cfe4ff" stroke-opacity=".7" stroke-width="1.2">
    <line x1="320" y1="430" x2="560" y2="430" marker-start="url(#arw6)" marker-end="url(#arw6)"/>
  </g>
  <text x="440" y="452" fill="#cfe4ff" font-family="monospace" font-size="14" text-anchor="middle">240</text>

  <!-- title block -->
  <g stroke="#cfe4ff" stroke-opacity=".6" fill="none" stroke-width="1.4">
    <rect x="500" y="516" width="282" height="66"/>
    <line x1="500" y1="549" x2="782" y2="549"/>
    <line x1="640" y1="516" x2="640" y2="582"/>
  </g>
  <text x="512" y="538" fill="#eaf3ff" font-family="monospace" font-size="17" letter-spacing="1">VERTEX STUDIO</text>
  <text x="512" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">BRANDING</text>
  <text x="652" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">REV · A</text>
</svg>
