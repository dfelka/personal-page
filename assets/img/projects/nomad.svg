<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blueprint drawing of the Nomad Travel App and route map">
  <defs>
    <pattern id="grid-s3" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <pattern id="grid-l3" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0f375a"/>
  <rect width="800" height="600" fill="url(#grid-s3)"/>
  <rect width="800" height="600" fill="url(#grid-l3)"/>
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#cfe4ff" stroke-opacity=".55" stroke-width="2"/>

  <g fill="none" stroke="#eaf3ff" stroke-opacity=".9" stroke-width="2">
    <!-- phone body -->
    <rect x="120" y="90" width="220" height="420" rx="26"/>
    <line x1="120" y1="140" x2="340" y2="140"/>
    <line x1="120" y1="460" x2="340" y2="460"/>
    <rect x="205" y="108" width="50" height="8" rx="4"/>
    <!-- map route inside phone -->
    <path d="M150 180 Q200 210 180 260 T260 320 Q300 350 250 400" stroke-width="2.2" stroke-dasharray="7 6"/>
    <circle cx="150" cy="180" r="7"/>
    <!-- route map on the right -->
    <path d="M420 420 Q480 300 560 340 T700 200" stroke-width="2.4" stroke-dasharray="8 7"/>
    <circle cx="420" cy="420" r="9"/>
    <g stroke-width="1.3" stroke-opacity=".6">
      <line x1="400" y1="120" x2="720" y2="120"/>
      <line x1="400" y1="480" x2="720" y2="480"/>
      <line x1="400" y1="120" x2="400" y2="480"/>
      <line x1="720" y1="120" x2="720" y2="480"/>
    </g>
  </g>

  <!-- accent destination pin -->
  <g>
    <path d="M700 180 a16 16 0 1 0 .1 0 M700 196 l0 22" fill="none" stroke="#ff6464" stroke-width="3"/>
    <circle cx="700" cy="196" r="5" fill="#ff6464"/>
  </g>
  <text x="640" y="150" fill="#cfe4ff" font-family="monospace" font-size="14">DEST.</text>

  <!-- title block -->
  <g stroke="#cfe4ff" stroke-opacity=".6" fill="none" stroke-width="1.4">
    <rect x="500" y="516" width="282" height="66"/>
    <line x1="500" y1="549" x2="782" y2="549"/>
    <line x1="640" y1="516" x2="640" y2="582"/>
  </g>
  <text x="512" y="538" fill="#eaf3ff" font-family="monospace" font-size="17" letter-spacing="1">NOMAD TRAVEL</text>
  <text x="512" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">MOBILE APP</text>
  <text x="652" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">REV · A</text>
</svg>
