<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blueprint drawing of the Bloom Identity logo construction">
  <defs>
    <pattern id="grid-s5" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <pattern id="grid-l5" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0f375a"/>
  <rect width="800" height="600" fill="url(#grid-s5)"/>
  <rect width="800" height="600" fill="url(#grid-l5)"/>
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#cfe4ff" stroke-opacity=".55" stroke-width="2"/>

  <!-- construction guides -->
  <g fill="none" stroke="#cfe4ff" stroke-opacity=".4" stroke-width="1">
    <circle cx="400" cy="290" r="150"/>
    <circle cx="400" cy="290" r="100"/>
    <line x1="150" y1="290" x2="650" y2="290"/>
    <line x1="400" y1="90" x2="400" y2="490"/>
    <line x1="258" y1="148" x2="542" y2="432"/>
    <line x1="542" y1="148" x2="258" y2="432"/>
  </g>

  <!-- petals (logo mark) -->
  <g fill="none" stroke="#eaf3ff" stroke-opacity=".92" stroke-width="2.2">
    <path d="M400 290 C 340 200 460 200 400 290 Z"/>
    <path d="M400 290 C 490 230 490 350 400 290 Z"/>
    <path d="M400 290 C 460 380 340 380 400 290 Z"/>
    <path d="M400 290 C 310 350 310 230 400 290 Z"/>
    <circle cx="400" cy="290" r="16"/>
  </g>
  <circle cx="400" cy="290" r="6" fill="#ff6464"/>

  <!-- radius marks -->
  <g stroke="#cfe4ff" stroke-opacity=".7" stroke-width="1.2">
    <line x1="400" y1="290" x2="550" y2="290"/>
  </g>
  <text x="470" y="282" fill="#cfe4ff" font-family="monospace" font-size="14">R 150</text>
  <text x="250" y="470" fill="#cfe4ff" font-family="monospace" font-size="13">GOLDEN GRID · 1 : 1.618</text>

  <!-- title block -->
  <g stroke="#cfe4ff" stroke-opacity=".6" fill="none" stroke-width="1.4">
    <rect x="500" y="516" width="282" height="66"/>
    <line x1="500" y1="549" x2="782" y2="549"/>
    <line x1="640" y1="516" x2="640" y2="582"/>
  </g>
  <text x="512" y="538" fill="#eaf3ff" font-family="monospace" font-size="17" letter-spacing="1">BLOOM IDENTITY</text>
  <text x="512" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">BRANDING</text>
  <text x="652" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">REV · A</text>
</svg>
