<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blueprint drawing of the Aurora Dashboard layout">
  <defs>
    <pattern id="grid-s" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <pattern id="grid-l" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="1"/>
    </pattern>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9z" fill="#cfe4ff"/></marker>
  </defs>
  <rect width="800" height="600" fill="#0f375a"/>
  <rect width="800" height="600" fill="url(#grid-s)"/>
  <rect width="800" height="600" fill="url(#grid-l)"/>
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#cfe4ff" stroke-opacity=".55" stroke-width="2"/>

  <g fill="none" stroke="#eaf3ff" stroke-opacity=".9" stroke-width="2">
    <!-- app frame -->
    <rect x="80" y="90" width="640" height="380" rx="6"/>
    <line x1="80" y1="140" x2="720" y2="140"/>
    <line x1="230" y1="140" x2="230" y2="470"/>
    <!-- sidebar items -->
    <g stroke-width="1.4" stroke-opacity=".65">
      <line x1="110" y1="180" x2="200" y2="180"/>
      <line x1="110" y1="210" x2="200" y2="210"/>
      <line x1="110" y1="240" x2="200" y2="240"/>
      <line x1="110" y1="270" x2="200" y2="270"/>
    </g>
    <!-- stat cards -->
    <rect x="260" y="170" width="130" height="70" rx="4"/>
    <rect x="410" y="170" width="130" height="70" rx="4"/>
    <rect x="560" y="170" width="130" height="70" rx="4"/>
    <!-- chart panel with axes -->
    <rect x="260" y="270" width="430" height="170" rx="4"/>
    <polyline points="290,410 350,380 410,395 470,340 530,360 590,300 650,320" stroke-width="2.2"/>
  </g>

  <!-- accent data point -->
  <circle cx="590" cy="300" r="6" fill="#ff6464"/>

  <!-- dimension line -->
  <g stroke="#cfe4ff" stroke-opacity=".7" stroke-width="1.2">
    <line x1="80" y1="500" x2="720" y2="500" marker-start="url(#arw)" marker-end="url(#arw)"/>
    <line x1="80" y1="494" x2="80" y2="506"/>
    <line x1="720" y1="494" x2="720" y2="506"/>
  </g>
  <text x="400" y="492" fill="#cfe4ff" font-family="monospace" font-size="16" text-anchor="middle">1440 px</text>

  <!-- title block -->
  <g stroke="#cfe4ff" stroke-opacity=".6" fill="none" stroke-width="1.4">
    <rect x="500" y="516" width="282" height="66"/>
    <line x1="500" y1="549" x2="782" y2="549"/>
    <line x1="640" y1="516" x2="640" y2="582"/>
  </g>
  <text x="512" y="538" fill="#eaf3ff" font-family="monospace" font-size="17" letter-spacing="1">AURORA DASHBOARD</text>
  <text x="512" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">WEB APP</text>
  <text x="652" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">REV · A</text>
</svg>
