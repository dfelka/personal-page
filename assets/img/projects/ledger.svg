<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Blueprint drawing of the Ledger Fintech charts">
  <defs>
    <pattern id="grid-s2" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
    </pattern>
    <pattern id="grid-l2" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M100 0H0V100" fill="none" stroke="#ffffff" stroke-opacity=".15" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0f375a"/>
  <rect width="800" height="600" fill="url(#grid-s2)"/>
  <rect width="800" height="600" fill="url(#grid-l2)"/>
  <rect x="18" y="18" width="764" height="564" fill="none" stroke="#cfe4ff" stroke-opacity=".55" stroke-width="2"/>

  <g fill="none" stroke="#eaf3ff" stroke-opacity=".9" stroke-width="2">
    <!-- axes -->
    <line x1="120" y1="110" x2="120" y2="450"/>
    <line x1="120" y1="450" x2="690" y2="450"/>
    <!-- gridlines -->
    <g stroke-width="1" stroke-opacity=".4">
      <line x1="120" y1="370" x2="690" y2="370"/>
      <line x1="120" y1="290" x2="690" y2="290"/>
      <line x1="120" y1="210" x2="690" y2="210"/>
      <line x1="120" y1="130" x2="690" y2="130"/>
    </g>
    <!-- bars -->
    <rect x="170" y="330" width="46" height="120"/>
    <rect x="250" y="270" width="46" height="180"/>
    <rect x="330" y="300" width="46" height="150"/>
    <rect x="410" y="220" width="46" height="230"/>
    <rect x="490" y="180" width="46" height="270"/>
    <rect x="570" y="250" width="46" height="200"/>
    <!-- trend line -->
    <polyline points="193,320 273,262 353,292 433,212 513,172 593,242" stroke-width="2.2" stroke-dasharray="6 5"/>
  </g>

  <!-- accent bar highlight -->
  <rect x="490" y="180" width="46" height="270" fill="#ff6464" fill-opacity=".9"/>

  <!-- radius / callout -->
  <g stroke="#cfe4ff" stroke-opacity=".7" stroke-width="1.2" fill="none">
    <circle cx="513" cy="172" r="10"/>
    <line x1="520" y1="165" x2="620" y2="110"/>
  </g>
  <text x="625" y="112" fill="#cfe4ff" font-family="monospace" font-size="14">PEAK Q4</text>

  <!-- title block -->
  <g stroke="#cfe4ff" stroke-opacity=".6" fill="none" stroke-width="1.4">
    <rect x="500" y="516" width="282" height="66"/>
    <line x1="500" y1="549" x2="782" y2="549"/>
    <line x1="640" y1="516" x2="640" y2="582"/>
  </g>
  <text x="512" y="538" fill="#eaf3ff" font-family="monospace" font-size="17" letter-spacing="1">LEDGER FINTECH</text>
  <text x="512" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">WEB APP</text>
  <text x="652" y="570" fill="#cfe4ff" font-family="monospace" font-size="13">REV · A</text>
</svg>
