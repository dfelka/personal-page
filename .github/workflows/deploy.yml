name: Deploy to GitHub Pages

# Redeploy on every push to main; also allow manual runs from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Install exactly what's in the lockfile, then compile Tailwind.
      - run: npm ci
      - run: npm run build

      # Assemble just the files the site needs (keeps node_modules out of the artifact).
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4